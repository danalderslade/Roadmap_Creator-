apiVersion: apps/v1
kind: Deployment
metadata:
  name: roadmap-creator
  labels:
    app: roadmap-creator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: roadmap-creator
  template:
    metadata:
      labels:
        app: roadmap-creator
    spec:
      containers:
        - name: roadmap-creator
          image: your-registry/roadmap-creator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: roadmap-creator
  labels:
    app: roadmap-creator
spec:
  selector:
    app: roadmap-creator
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
